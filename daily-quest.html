<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --panel: #111420;
  --border: #1e2440;
  --accent: #f5c842;
  --accent2: #4af0b0;
  --accent3: #a07cf5;
  --red: #f05a5a;
  --text: #d4daf0;
  --muted: #5a6080;
  --skin: #c8956c;
  --skin-dark: #a8714a;
  --hair: #1a0f00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh; padding: 24px 16px 60px;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(160,124,245,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(74,240,176,0.05) 0%, transparent 60%);
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  color: var(--accent); letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(245,200,66,0.4);
}
.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
.date-label { font-size:0.8rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

/* HERO CARD */
.hero-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.hero-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--border-color1, var(--accent3)), var(--border-color2, var(--accent)), var(--border-color3, var(--accent2)));
}
.hero-top { display:flex; align-items:flex-end; gap:16px; margin-bottom:16px; }

/* ===================== CSS AVATAR ===================== */
.avatar-wrap {
  position: relative; width: 80px; height: 100px;
  flex-shrink: 0;
}

/* AURA - behind everything */
.av-aura {
  position:absolute; border-radius:50%;
  left:50%; transform:translateX(-50%);
  opacity:0; transition: all 0.5s;
}

/* BODY / TORSO */
.av-body {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:44px; height:32px; border-radius:8px 8px 0 0;
  background: #2a2a3a; transition: background 0.4s;
}
/* ARMOR OVERLAY on torso */
.av-armor {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:44px; height:32px; border-radius:8px 8px 0 0;
  opacity:0; transition: opacity 0.4s;
  background: linear-gradient(180deg, #888 0%, #555 100%);
  clip-path: polygon(10% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
}
/* SHOULDER PADS */
.av-shoulder-l, .av-shoulder-r {
  position:absolute; bottom:20px; width:14px; height:12px;
  border-radius:6px 6px 3px 3px;
  background: linear-gradient(180deg, #aaa 0%, #666 100%);
  opacity:0; transition: opacity 0.4s;
}
.av-shoulder-l { left:4px; }
.av-shoulder-r { right:4px; }
/* CAPE */
.av-cape {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:52px; height:36px;
  background: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
  border-radius:4px 4px 20px 20px;
  opacity:0; transition: opacity 0.4s;
  z-index:0;
}
/* NECK */
.av-neck {
  position:absolute; bottom:31px; left:50%; transform:translateX(-50%);
  width:12px; height:10px; background: var(--skin); border-radius:2px;
}
/* HEAD */
.av-head {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
  width:36px; height:34px; background: var(--skin); border-radius:50% 50% 45% 45%;
  z-index:2;
}
/* FACE DETAILS */
.av-eye-l, .av-eye-r {
  position:absolute; top:13px; width:5px; height:5px;
  background:#1a0a00; border-radius:50%;
}
.av-eye-l { left:8px; }
.av-eye-r { right:8px; }
/* eyeball shine */
.av-eye-l::after, .av-eye-r::after {
  content:''; position:absolute; top:1px; left:1px;
  width:2px; height:2px; background:rgba(255,255,255,0.6); border-radius:50%;
}
.av-nose {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; background: var(--skin-dark); border-radius:50%;
}
.av-mouth {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  width:10px; height:4px;
  border-bottom: 2px solid var(--skin-dark);
  border-radius: 0 0 6px 6px;
}
/* AFRO */
.av-afro {
  position:absolute; bottom:62px; left:50%; transform:translateX(-50%);
  width:48px; height:36px;
  background: var(--hair);
  border-radius: 50% 50% 30% 30%;
  z-index:3;
  box-shadow: -4px 2px 0 var(--hair), 4px 2px 0 var(--hair),
              0 -4px 0 var(--hair), -6px -1px 0 var(--hair), 6px -1px 0 var(--hair);
}
/* afro texture bumps */
.av-afro::before {
  content:'';
  position:absolute; top:-4px; left:4px;
  width:40px; height:20px;
  background: radial-gradient(circle at 20% 50%, #2a1800 0%, transparent 40%),
              radial-gradient(circle at 50% 30%, #2a1800 0%, transparent 35%),
              radial-gradient(circle at 80% 50%, #2a1800 0%, transparent 40%);
  border-radius:50%;
}
/* CROWN - Legend+ */
.av-crown {
  position:absolute; bottom:94px; left:50%; transform:translateX(-50%);
  width:28px; height:14px; z-index:4; opacity:0; transition: opacity 0.4s;
}
.av-crown::before {
  content:''; position:absolute; bottom:0; left:0; right:0; height:6px;
  background: var(--accent); border-radius:2px;
}
.av-crown::after {
  content:''; position:absolute; bottom:5px; left:0; right:0;
  height:10px;
  background: var(--accent);
  clip-path: polygon(0% 100%, 0% 40%, 20% 0%, 40% 60%, 50% 0%, 60% 60%, 80% 0%, 100% 40%, 100% 100%);
}
/* SWORD */
.av-sword {
  position:absolute; bottom:4px; right:-4px;
  width:8px; height:42px; z-index:1; opacity:0; transition: opacity 0.4s;
}
.av-sword::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:4px; height:32px;
  background: linear-gradient(180deg, #ddd 0%, #aaa 50%, #888 100%);
  border-radius:2px 2px 0 0;
}
.av-sword::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:8px; height:12px;
  background: #8B4513;
  border-radius:2px;
}
/* BOOK */
.av-book {
  position:absolute; bottom:6px; left:-4px;
  width:14px; height:18px; z-index:1; opacity:0; transition: opacity 0.4s;
  background: #8B0000; border-radius:1px 3px 3px 1px;
  border-left: 3px solid #5a0000;
}
.av-book::after {
  content:''; position:absolute; top:4px; left:3px; right:2px;
  height:2px; background: rgba(255,255,255,0.3);
  box-shadow: 0 4px 0 rgba(255,255,255,0.3), 0 8px 0 rgba(255,255,255,0.3);
}
/* MYTHIC PARTICLES */
.av-particles {
  position:absolute; inset:-10px; border-radius:50%;
  opacity:0; pointer-events:none; transition: opacity 0.4s;
}
.av-particles::before, .av-particles::after {
  content:'';
  position:absolute; border-radius:50%;
  animation: particleSpin 3s linear infinite;
}
.av-particles::before {
  width:6px; height:6px; background:#fff;
  top:10px; left:50%;
  box-shadow: 20px 60px 0 rgba(255,255,255,0.8), -20px 70px 0 rgba(200,200,255,0.6),
              30px 20px 0 rgba(255,255,200,0.7), -30px 30px 0 rgba(255,200,255,0.5);
}
.av-particles::after {
  width:4px; height:4px; background:var(--accent);
  top:50%; right:5px;
  box-shadow: -60px -20px 0 rgba(245,200,66,0.7), -50px 30px 0 rgba(74,240,176,0.6),
              10px -50px 0 rgba(160,124,245,0.8);
  animation-direction: reverse; animation-duration: 2s;
}
@keyframes particleSpin {
  from { transform: rotate(0deg) translateX(0); }
  to { transform: rotate(360deg) translateX(0); }
}
/* ETERNAL ANIMATED AURA */
@keyframes auraGlow {
  0%,100% { transform:translateX(-50%) scale(1); opacity:0.5; }
  50% { transform:translateX(-50%) scale(1.1); opacity:0.8; }
}
@keyframes auraRotate {
  from { transform:translateX(-50%) rotate(0deg); }
  to { transform:translateX(-50%) rotate(360deg); }
}

/* =============== CLASS VARIANTS =============== */

/* NOVICE - plain */
.cls-novice .av-body { background:#2a2a3a; }

/* APPRENTICE - book appears, warmer outfit */
.cls-apprentice .av-book { opacity:1; }
.cls-apprentice .av-body { background:#3a2a1a; }

/* WARRIOR - sword, armor, shoulders, red aura */
.cls-warrior .av-sword { opacity:1; }
.cls-warrior .av-armor { opacity:1; }
.cls-warrior .av-shoulder-l, .cls-warrior .av-shoulder-r { opacity:1; }
.cls-warrior .av-aura {
  width:70px; height:70px; bottom:-10px;
  background: radial-gradient(circle, rgba(240,90,50,0.35) 0%, transparent 70%);
  opacity:1;
}

/* CHAMPION - sword+armor+cape+gold aura */
.cls-champion .av-sword { opacity:1; }
.cls-champion .av-armor { opacity:1; background:linear-gradient(180deg,#d4af37 0%,#8B6914 100%); }
.cls-champion .av-shoulder-l, .cls-champion .av-shoulder-r {
  opacity:1; background:linear-gradient(180deg,#d4af37 0%,#8B6914 100%);
}
.cls-champion .av-cape { opacity:1; background:linear-gradient(180deg,#8b0000 0%,#4a0000 100%); }
.cls-champion .av-aura {
  width:80px; height:80px; bottom:-10px;
  background: radial-gradient(circle, rgba(245,200,66,0.4) 0%, transparent 70%);
  opacity:1;
}

/* LEGEND - crown, full gear, purple aura */
.cls-legend .av-sword { opacity:1; }
.cls-legend .av-armor { opacity:1; background:linear-gradient(180deg,#c0c0c0 0%,#707070 100%); }
.cls-legend .av-shoulder-l, .cls-legend .av-shoulder-r {
  opacity:1; background:linear-gradient(180deg,#c0c0c0 0%,#707070 100%);
}
.cls-legend .av-cape { opacity:1; background:linear-gradient(180deg,#4b0082 0%,#1a0030 100%); }
.cls-legend .av-crown { opacity:1; }
.cls-legend .av-aura {
  width:90px; height:90px; bottom:-14px;
  background: radial-gradient(circle, rgba(160,124,245,0.5) 0%, transparent 70%);
  opacity:1; animation: auraGlow 2s ease-in-out infinite;
}

/* ETERNAL - everything + bigger animated aura */
.cls-eternal .av-sword { opacity:1; }
.cls-eternal .av-armor { opacity:1; background:linear-gradient(180deg,#e8e8ff 0%,#9090cc 100%); }
.cls-eternal .av-shoulder-l, .cls-eternal .av-shoulder-r {
  opacity:1; background:linear-gradient(180deg,#e8e8ff 0%,#9090cc 100%);
}
.cls-eternal .av-cape { opacity:1; background:linear-gradient(180deg,#0a0050 0%,#050020 100%); }
.cls-eternal .av-crown { opacity:1; }
.cls-eternal .av-crown::before { background: var(--accent3); }
.cls-eternal .av-crown::after { background: var(--accent3); }
.cls-eternal .av-aura {
  width:100px; height:100px; bottom:-18px;
  background: radial-gradient(circle, rgba(160,124,245,0.6) 0%, rgba(74,240,176,0.2) 50%, transparent 70%);
  opacity:1; animation: auraGlow 1.5s ease-in-out infinite;
}

/* MYTHIC - transcended, white glow, particles */
.cls-mythic .av-sword { opacity:1; }
.cls-mythic .av-armor { opacity:1; background:linear-gradient(180deg,#fff 0%,#c0c0c0 100%); box-shadow:0 0 10px rgba(255,255,255,0.8); }
.cls-mythic .av-shoulder-l, .cls-mythic .av-shoulder-r {
  opacity:1; background:linear-gradient(180deg,#fff 0%,#c0c0c0 100%);
}
.cls-mythic .av-cape { opacity:1; background:linear-gradient(180deg,rgba(255,255,255,0.4) 0%,rgba(200,200,255,0.1) 100%); }
.cls-mythic .av-crown { opacity:1; }
.cls-mythic .av-crown::before { background:#fff; box-shadow:0 0 8px #fff; }
.cls-mythic .av-crown::after { background:#fff; }
.cls-mythic .av-head { box-shadow: 0 0 12px rgba(255,255,255,0.5); }
.cls-mythic .av-aura {
  width:110px; height:110px; bottom:-20px;
  background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(160,124,245,0.3) 40%, transparent 70%);
  opacity:1; animation: auraGlow 1s ease-in-out infinite;
}
.cls-mythic .av-particles { opacity:1; }

/* ============================================= */

.hero-info { flex:1; }
.hero-info h2 { font-size:1.2rem; font-weight:700; color:#fff; letter-spacing:1px; }
.hero-info .level-badge {
  display:inline-block; font-size:0.7rem;
  background:rgba(245,200,66,0.15); color:var(--accent);
  border:1px solid rgba(245,200,66,0.3); border-radius:4px;
  padding:2px 8px; margin-top:4px; letter-spacing:1px; text-transform:uppercase;
}
.hero-info .class-name {
  display:block; font-size:0.85rem; font-weight:600; margin-top:6px;
  color: var(--class-color, var(--text));
  letter-spacing:0.5px;
}
.xp-row { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--muted); margin-bottom:6px; }
.xp-row span:last-child { color:var(--accent); font-weight:600; }
.xp-bar-wrap { background:rgba(255,255,255,0.06); border-radius:999px; height:8px; overflow:hidden; }
.xp-bar-fill {
  height:100%; border-radius:999px;
  background:linear-gradient(90deg, var(--accent3), var(--accent));
  transition:width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(245,200,66,0.5);
}
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px; }
.stat-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.stat-box .val { font-size:1.4rem; font-weight:700; color:#fff; }
.stat-box .lbl { font-size:0.65rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
.stat-box.streak .val { color:var(--accent); }
.stat-box.done .val { color:var(--accent2); }
.stat-box.total .val { color:var(--accent3); }

.section-title { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.quests { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.quest-card {
  background:var(--panel); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;
  user-select:none; -webkit-tap-highlight-color:transparent;
}
.quest-card:active { transform:scale(0.98); }
.quest-card.done { border-color:rgba(74,240,176,0.25); background:rgba(74,240,176,0.04); }
.quest-card.done::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);
}
.quest-icon { font-size:1.6rem; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.04); border-radius:10px; flex-shrink:0; }
.quest-info { flex:1; }
.quest-info .quest-name { font-size:1rem; font-weight:600; color:#fff; letter-spacing:0.5px; }
.quest-card.done .quest-name { text-decoration:line-through; color:var(--muted); }
.quest-info .quest-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.quest-xp { font-size:0.8rem; font-weight:700; color:var(--accent); letter-spacing:1px; flex-shrink:0; }
.quest-card.done .quest-xp { color:var(--accent2); }
.check-circle {
  width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all 0.25s; font-size:0.7rem; color:transparent;
}
.quest-card.done .check-circle { background:var(--accent2); border-color:var(--accent2); color:#0a0c14; font-size:0.8rem; }

.penalty-section { background:var(--panel); border:1px solid rgba(240,90,90,0.2); border-radius:14px; padding:16px; margin-bottom:24px; }
.penalty-section .section-title { color:rgba(240,90,90,0.6); margin-bottom:10px; }
.penalty-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; -webkit-tap-highlight-color:transparent; }
.penalty-item:last-child { border-bottom:none; }
.penalty-icon { font-size:1.2rem; width:28px; text-align:center; flex-shrink:0; }
.penalty-name { flex:1; font-size:0.9rem; color:var(--text); }
.penalty-item.triggered .penalty-name { color:var(--red); }
.penalty-cost { font-size:0.75rem; font-weight:700; color:var(--red); opacity:0.6; }
.penalty-item.triggered .penalty-cost { opacity:1; }
.penalty-check { width:20px; height:20px; border-radius:50%; border:2px solid rgba(240,90,90,0.3); display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:transparent; transition:all 0.2s; flex-shrink:0; }
.penalty-item.triggered .penalty-check { background:var(--red); border-color:var(--red); color:white; }

.motivate-card { background:linear-gradient(135deg,rgba(160,124,245,0.1),rgba(74,240,176,0.06)); border:1px solid rgba(160,124,245,0.2); border-radius:14px; padding:16px; text-align:center; margin-bottom:24px; }
.motivate-card p { font-size:0.85rem; color:var(--accent3); font-style:italic; line-height:1.5; }
.motivate-card .verse-ref { font-size:0.7rem; color:var(--muted); margin-top:6px; }

.reset-btn { display:block; width:100%; padding:14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:0.9rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.reset-btn:hover { border-color:var(--accent); color:var(--accent); }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px 20px; font-size:0.9rem; font-weight:600; color:var(--accent); letter-spacing:1px; box-shadow:0 8px 32px rgba(0,0,0,0.5); transition:transform 0.35s cubic-bezier(.4,0,.2,1); z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* OVERLAYS */
.levelup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.levelup-overlay.show { opacity:1; pointer-events:all; }
.levelup-box { text-align:center; padding:0 28px; max-width:340px; }
.levelup-box.anim { animation:popIn 0.4s cubic-bezier(.4,0,.2,1) forwards; }
.overlay-icon { font-size:3.5rem; margin-bottom:10px; display:block; }
.overlay-old { font-size:0.9rem; color:var(--muted); margin-bottom:4px; text-decoration:line-through; }
.overlay-title { font-family:'Cinzel Decorative',serif; font-size:clamp(1.1rem,5vw,1.5rem); color:var(--accent); text-shadow:0 0 30px rgba(245,200,66,0.7); margin-bottom:6px; line-height:1.3; }
.overlay-title.class-change { color: var(--overlay-color, var(--accent)); text-shadow: 0 0 30px var(--overlay-glow, rgba(245,200,66,0.7)); }
.overlay-sub { color:var(--text); font-size:0.95rem; margin-bottom:6px; line-height:1.5; }
.overlay-msg { color:var(--muted); font-size:0.8rem; font-style:italic; margin-bottom:20px; }
.overlay-btn { padding:12px 28px; background:var(--accent); color:#0a0c14; border:none; border-radius:10px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; }
@keyframes popIn { from{transform:scale(0.7);opacity:0;} to{transform:scale(1);opacity:1;} }

#confettiCanvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:9998; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>⚔ Daily Quest</h1>
  <div class="date-label" id="dateLabel"></div>
</div>

<div class="hero-card" id="heroCard">
  <div class="hero-top">
    <!-- CSS AVATAR -->
    <div class="avatar-wrap" id="avatarWrap">
      <div class="av-aura"></div>
      <div class="av-particles"></div>
      <div class="av-cape"></div>
      <div class="av-body"></div>
      <div class="av-armor"></div>
      <div class="av-shoulder-l"></div>
      <div class="av-shoulder-r"></div>
      <div class="av-neck"></div>
      <div class="av-head">
        <div class="av-eye-l"></div>
        <div class="av-eye-r"></div>
        <div class="av-nose"></div>
        <div class="av-mouth"></div>
      </div>
      <div class="av-afro"></div>
      <div class="av-crown"></div>
      <div class="av-sword"></div>
      <div class="av-book"></div>
    </div>
    <div class="hero-info">

// ============ LEVEL / CLASS SYSTEM ============
// Each entry: level number, XP needed to reach it, class key, subdivision title, isClassChange
// XP per level scales: ~50 XP each early level, growing gradually
// A solid day = ~100-130 XP realistically
// Level 1-9: Novice. Level 10-29: Apprentice. Level 30-59: Warrior. Level 60-99: Champion.
// Level 100-149: Legend. Level 150-199: Eternal. Level 200+: Mythic.

function buildLevels() {
  const levels = [];
  // XP thresholds per level - designed so each level takes roughly 3-7 days
  // cumulative XP needed
  const xpPerLevel = [
    0,//L1
    100,//L2
    210,//L3
    340,//L4
    490,//L5
    660,//L6
    840,//L7
    1030,//L8
    1250,//L9 - end of Novice
    1480,//L10 - Apprentice start
    1720,//L11
    1980,//L12
    2260,//L13 - end of Rough Apprentice
    2560,//L14
    2870,//L15
    3200,//L16 - end of Keen Apprentice
    3540,//L17
    3900,//L18
    4280,//L19
    4670,//L20
    5080,//L21
    5510,//L22
    5950,//L23
    6410,//L24
    6890,//L25
    7380,//L26
    7890,//L27
    8410,//L28
    8950,//L29 - end of Apprentice
    9510,//L30 - Warrior start
    10160,//L31
    10840,//L32
    11520,//L33
    12230,//L34
    12950,//L35
    13690,//L36
    14440,//L37
    15210,//L38
    16000,//L39 - end of Iron Warrior
    16800,//L40
    17700,//L41
    18620,//L42
    19560,//L43

    21480,//L45
    22460,//L46
    23460,//L47

    25510,//L49 - end of Steel Warrior
    26560,//L50
    27700,//L51
    28870,//L52
    30050,//L53
    31250,//L54
    32460,//L55
    33690,//L56
    34930,//L57
    36200,//L58
    37480,//L59 - end of Battle-Hardened Warrior
    38770,//L60 - Champion start
    40250,//L61
    41740,//L62
    43250,//L63
    44770,//L64
    46310,//L65
    47870,//L66
    49440,//L67
    51030,//L68
    52640,//L69 - end of Rising Champion
    54260,//L70
    55980,//L71
    57720,//L72
    59480,//L73
    61250,//L74
    63030,//L75
    64840,//L76

    70340,//L79 - end of Crowned Champion
    72210,//L80

    185250,//L117

    275410,//L133

  ];

  for (let i = 0; i < xpPerLevel.length; i++) {
    const lv = i + 1;
    let classKey, subdivision, isClassChange = false, isSubChange = false;

    if (lv <= 9) {
      classKey = 'novice'; subdivision = 'Novice';
      if (lv === 1) isClassChange = true;
    } else if (lv <= 29) {
      classKey = 'apprentice';
      if (lv <= 13) subdivision = 'Rough Apprentice';
      else if (lv <= 16) subdivision = 'Keen Apprentice';
      else subdivision = 'Sharp Apprentice';
      if (lv === 10) isClassChange = true;
      if (lv === 14 || lv === 17) isSubChange = true;
    } else if (lv <= 59) {
      classKey = 'warrior';
      if (lv <= 39) subdivision = 'Iron Warrior';
      else if (lv <= 49) subdivision = 'Steel Warrior';
      else subdivision = 'Battle-Hardened Warrior';
      if (lv === 30) isClassChange = true;
      if (lv === 40 || lv === 50) isSubChange = true;
    } else if (lv <= 99) {
      classKey = 'champion';
      if (lv <= 69) subdivision = 'Rising Champion';
      else if (lv <= 79) subdivision = 'Crowned Champion';
      else subdivision = 'Unbroken Champion';
      if (lv === 60) isClassChange = true;
      if (lv === 70 || lv === 80) isSubChange = true;
    } else if (lv <= 149) {
      classKey = 'legend';
      if (lv <= 116) subdivision = 'Emerging Legend';
      else if (lv <= 132) subdivision = 'Rising Legend';
      else subdivision = 'True Legend';
      if (lv === 100) isClassChange = true;
      if (lv === 117 || lv === 133) isSubChange = true;
    } else if (lv <= 199) {
      classKey = 'eternal';
      if (lv <= 166) subdivision = 'Eternal I';
      else if (lv <= 183) subdivision = 'Eternal II';
      else subdivision = 'Eternal III';
      if (lv === 150) isClassChange = true;
      if (lv === 167 || lv === 184) isSubChange = true;
    } else {
      classKey = 'mythic';
      subdivision = 'Mythic';
      if (lv === 200) isClassChange = true;
    }

    levels.push({ level: lv, xpNeeded: xpPerLevel[i], classKey, subdivision, isClassChange, isSubChange });
  }

  // Level 200+ Mythic (open ended - generate up to 300)
  let lastXp = xpPerLevel[xpPerLevel.length - 1];
  for (let lv = xpPerLevel.length + 1; lv <= 300; lv++) {
    lastXp += 12000 + (lv - 150) * 160;
    levels.push({ level: lv, xpNeeded: lastXp, classKey:'mythic', subdivision:'Mythic', isClassChange: lv===200, isSubChange: false });
  }

  return levels;
}

const LEVELS = buildLevels();

const CLASS_META = {
  novice:     { color:'#a0a8c0', glow:'rgba(160,168,192,0.5)', icon:'🧢', cssClass:'cls-novice',
                msg: 'Every legend starts somewhere. This is your day one.' },
  apprentice: { color:'#c89060', glow:'rgba(200,144,96,0.5)', icon:'📖', cssClass:'cls-apprentice',
                msg: 'The basics are no longer enough. You are sharpening.' },
  warrior:    { color:'#f05a5a', glow:'rgba(240,90,90,0.6)', icon:'⚔️', cssClass:'cls-warrior',
                msg: 'The grind is real now. Warriors are built, not born.' },
  champion:   { color:'#f5c842', glow:'rgba(245,200,66,0.6)', icon:'🏆', cssClass:'cls-champion',
                msg: 'Most people quit before this. You did not.' },
  legend:     { color:'#a07cf5', glow:'rgba(160,124,245,0.7)', icon:'👑', cssClass:'cls-legend',
                msg: 'You actually did it. The world will know your name.' },
  eternal:    { color:'#4af0b0', glow:'rgba(74,240,176,0.7)', icon:'✨', cssClass:'cls-eternal',
                msg: 'Beyond legend. You are eternal now.' },
  mythic:     { color:'#ffffff', glow:'rgba(255,255,255,0.8)', icon:'🌟', cssClass:'cls-mythic',
                msg: 'No words. You transcended everything.' },
};

// ============ STATE ============
function getState() {
  const raw = localStorage.getItem('dq_state_v2');
  if (raw) { try { return JSON.parse(raw); } catch(e) {} }
  return { done:{}, penalties:{}, totalXp:0, streak:0, lastDate:'', rewardShown:{}, shownOverlays:{} };
}
function saveState(s) { localStorage.setItem('dq_state_v2', JSON.stringify(s)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

let state = getState();
if (!state.rewardShown) state.rewardShown = {};
if (!state.shownOverlays) state.shownOverlays = {};

const today = todayStr();
if (state.lastDate && state.lastDate !== today) {
  const allDone = QUESTS.every(q => state.done[q.id]);
  state.streak = allDone ? (state.streak||0)+1 : 0;
  state.done = {}; state.penalties = {};
  state.lastDate = today; saveState(state);
} else if (!state.lastDate) { state.lastDate = today; saveState(state); }

document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
const verse = VERSES[new Date().getDay()];
document.getElementById('verseText').textContent = verse.text;
document.getElementById('verseRef').textContent = verse.ref;

// ============ LEVEL HELPERS ============
function getLevelData(lv) {
  if (lv < 1) lv = 1;
  return LEVELS[Math.min(lv - 1, LEVELS.length - 1)];
}
function getCurrentLevelData() {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (state.totalXp >= l.xpNeeded) cur = l; else break; }
  return cur;
}
function getNextLevelData() {
  const cur = getCurrentLevelData();
  return LEVELS.find(l => l.level === cur.level + 1) || null;
}

// ============ AVATAR ============
function updateAvatar(classKey) {
  const wrap = document.getElementById('avatarWrap');
  wrap.className = 'avatar-wrap ' + (CLASS_META[classKey]?.cssClass || 'cls-novice');
}

// ============ RENDER HERO ============
function renderHero() {
  const cur = getCurrentLevelData();
  const next = getNextLevelData();
  const meta = CLASS_META[cur.classKey];

  updateAvatar(cur.classKey);

  document.getElementById('levelBadge').textContent = `Level ${cur.level}`;
  document.getElementById('className').textContent = cur.subdivision;
  document.getElementById('className').style.color = meta.color;

  const xpInLevel = state.totalXp - cur.xpNeeded;
  const xpForNext = next ? next.xpNeeded - cur.xpNeeded : 20000;
  const pct = Math.min(100, Math.round((xpInLevel / xpForNext) * 100));
  document.getElementById('xpLabel').textContent = `${state.totalXp.toLocaleString()} XP`;
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpBar').style.background = `linear-gradient(90deg, ${meta.color}88, ${meta.color})`;
  document.getElementById('doneVal').textContent = `${QUESTS.filter(q=>state.done[q.id]).length}/${QUESTS.length}`;
  document.getElementById('streakVal').textContent = state.streak||0;
  document.getElementById('totalXpVal').textContent = state.totalXp.toLocaleString();
}

function renderQuests() {
  const c = document.getElementById('questList'); c.innerHTML = '';
  for (const q of QUESTS) {
    const done = !!state.done[q.id];
    const div = document.createElement('div');
    div.className = 'quest-card'+(done?' done':'');
    div.innerHTML = `<div class="quest-icon">${q.icon}</div><div class="quest-info"><div class="quest-name">${q.name}</div><div class="quest-sub">${q.sub}</div></div><div class="quest-xp">+${q.xp} XP</div><div class="check-circle">${done?'✓':''}</div>`;
    div.addEventListener('click', ()=>toggleQuest(q.id, q.xp));
    c.appendChild(div);
  }
}

function renderPenalties() {
  const c = document.getElementById('penaltyList'); c.innerHTML = '';
  for (const p of PENALTIES) {
    const triggered = !!state.penalties[p.id];
    const div = document.createElement('div');
    div.className = 'penalty-item'+(triggered?' triggered':'');
    div.innerHTML = `<div class="penalty-icon">${p.icon}</div><div class="penalty-name">${p.name}</div><div class="penalty-cost">-${p.cost} XP</div><div class="penalty-check">${triggered?'✓':''}</div>`;
    div.addEventListener('click', ()=>togglePenalty(p.id, p.cost));
    c.appendChild(div);
  }
}

// ============ OVERLAY QUEUE ============
let overlayQueue = [];
let overlayOpen = false;

function queueOverlay(config) { overlayQueue.push(config); if (!overlayOpen) processQueue(); }

function processQueue() {
  if (overlayQueue.length === 0) { overlayOpen = false; return; }
  overlayOpen = true;
  const cfg = overlayQueue.shift();
  showOverlay(cfg);
}

function showOverlay(cfg) {
  document.getElementById('overlayIcon').textContent = cfg.icon || '⬆️';
  const oldEl = document.getElementById('overlayOld');
  if (cfg.old) { oldEl.style.display='block'; oldEl.textContent = cfg.old; }
  else { oldEl.style.display='none'; }
  const titleEl = document.getElementById('overlayTitle');
  titleEl.textContent = cfg.title;
  titleEl.className = 'overlay-title' + (cfg.classChange ? ' class-change' : '');
  if (cfg.classChange && cfg.color) {
    titleEl.style.color = cfg.color;
    titleEl.style.textShadow = `0 0 30px ${cfg.glow}`;
  } else {
    titleEl.style.color = '';
    titleEl.style.textShadow = '';
  }
  document.getElementById('overlaySub').textContent = cfg.sub || '';
  document.getElementById('overlayMsg').textContent = cfg.msg || '';
  document.getElementById('overlayBtn').textContent = cfg.btn || "LET'S GO";

  const box = document.getElementById('overlayBox');
  box.classList.remove('anim');
  void box.offsetWidth;
  box.classList.add('anim');

  document.getElementById('mainOverlay').classList.add('show');

  if (cfg.confetti) launchConfetti();
}

function closeOverlay() {
  document.getElementById('mainOverlay').classList.remove('show');
  stopConfetti();
  setTimeout(processQueue, 300);
}

// ============ LEVEL UP DETECTION ============
let prevLevelNum = getCurrentLevelData().level;
let prevSubdivision = getCurrentLevelData().subdivision;
let prevClassKey = getCurrentLevelData().classKey;

function checkLevelUps(oldXp, newXp) {
  // find all levels crossed
  for (const l of LEVELS) {
    if (l.xpNeeded > oldXp && l.xpNeeded <= newXp) {
      const key = `lv${l.level}`;
      if (state.shownOverlays[key]) continue;
      state.shownOverlays[key] = true;

      if (l.isClassChange && l.level > 1) {
        // BIG class change
        const meta = CLASS_META[l.classKey];
        const prevMeta = CLASS_META[prevClassKey] || CLASS_META['novice'];
        queueOverlay({
          icon: meta.icon,
          old: prevMeta ? `You were: ${LEVELS.find(x=>x.classKey===prevClassKey&&!x.isClassChange&&!x.isSubChange)?.subdivision || prevClassKey}` : null,
          title: `YOU ARE NOW ${l.subdivision.toUpperCase()}`,
          sub: `Level ${l.level} reached`,
          msg: meta.msg,
          btn: "CLAIM IT 🔥",
          classChange: true,
          color: meta.color,
          glow: meta.glow,
          confetti: true,
        });
      } else if (l.isSubChange) {
        // subdivision toast-style (simpler overlay)
        queueOverlay({
          icon: '⬆️',
          title: l.subdivision.toUpperCase(),
          sub: `Level ${l.level} · Subdivision upgrade`,
          msg: 'Keep climbing.',
          btn: 'NICE',
          confetti: false,
        });
      } else {
        // regular level up - just a toast, no overlay
        showToast(`Level ${l.level} ✓ +XP`);
      }
    }
  }
  saveState(state);
}

// ============ STREAK REWARDS ============
function checkStreakReward() {
  const s = state.streak;
  if (s === 7 && !state.rewardShown['7']) {
    state.rewardShown['7'] = true; saveState(state);
    queueOverlay({ icon:'😴', title:'7-DAY STREAK!', sub:'Reward: Sleep in guilt-free.', msg:'You earned the rest. Go ahead.', btn:'LET\'S GO 🔥', confetti:true });
  } else if (s === 30 && !state.rewardShown['30']) {
    state.rewardShown['30'] = true; saveState(state);
    queueOverlay({ icon:'👑', title:'30-DAY STREAK!', sub:'Reward: Go hang with your friends.', msg:'You absolutely deserve it.', btn:'LET\'S GO 🔥', confetti:true });
  }
}

// ============ ACTIONS ============
function toggleQuest(id, xp) {
  const oldXp = state.totalXp;
  if (state.done[id]) {
    state.done[id] = false;
    state.totalXp = Math.max(0, state.totalXp - xp);
    showToast(`-${xp} XP`);
  } else {
    state.done[id] = true;
    state.totalXp += xp;
    const doneCount = QUESTS.filter(q=>state.done[q.id]).length;
    if (doneCount === QUESTS.length) { state.totalXp += 30; showToast(`+${xp} XP · 🎉 ALL DONE +30!`); }
    else showToast(`+${xp} XP ✓`);
  }
  state.lastDate = today; saveState(state);
  if (state.totalXp > oldXp) checkLevelUps(oldXp, state.totalXp);
  renderAll();
}

function togglePenalty(id, cost) {
  if (state.penalties[id]) {
    state.penalties[id] = false;
    state.totalXp = Math.max(0, state.totalXp + cost);
    showToast(`Penalty removed (+${cost} XP back)`);
  } else {
    state.penalties[id] = true;
    state.totalXp = Math.max(0, state.totalXp - cost);
    showToast(`Penalty logged: -${cost} XP`);
  }
  state.lastDate = today; saveState(state); renderAll();
}

function resetDay() {
  if (!confirm("Reset today's progress?")) return;
  let xpToRemove = 0;
  for (const q of QUESTS) { if (state.done[q.id]) xpToRemove += q.xp; }
  if (QUESTS.every(q=>state.done[q.id])) xpToRemove += 30;
  for (const p of PENALTIES) { if (state.penalties[p.id]) xpToRemove -= p.cost; }
  state.totalXp = Math.max(0, state.totalXp - Math.max(0, xpToRemove));
  state.done = {}; state.penalties = {}; saveState(state);
  renderAll(); showToast('Day reset');
}

// ============ TOAST ============
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ============ CONFETTI ============
let confettiAnim = null;
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#f5c842','#4af0b0','#a07cf5','#f05a5a','#fff','#f0a842','#4af0f0'];
  for (let i = 0; i < 150; i++) {
    pieces.push({ x:Math.random()*canvas.width, y:-10-Math.random()*200, w:8+Math.random()*8, h:4+Math.random()*6,
      color:colors[Math.floor(Math.random()*colors.length)], rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.15, vx:(Math.random()-0.5)*3, vy:2+Math.random()*4 });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpeed;
      if (p.y < canvas.height+20) alive = true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color; ctx.globalAlpha=0.85;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    }
    if (alive) confettiAnim = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  draw();
}
function stopConfetti() {
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
  const canvas = document.getElementById('confettiCanvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

// ============ INIT ============
function renderAll() { renderHero(); renderQuests(); renderPenalties(); }
renderAll();
checkStreakReward();
</script>
